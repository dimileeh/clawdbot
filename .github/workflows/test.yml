name: Tests

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run tests
        run: ./tests/run-tests.sh
